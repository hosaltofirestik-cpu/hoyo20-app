<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <style>
    body { margin: 0; padding: 0; background: #f5f5f5; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top: 4px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
  </div>

  <script>
    (async () => {
      try {
        const resp = await fetch(window.location.pathname.replace(/\/$/, '') + '/');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        if (data.html) {
          document.open();
          document.write(data.html);
          document.close();
        } else {
          document.body.innerHTML = '<pre>Error: No HTML content in response</pre>';
        }
      } catch (err) {
        document.body.innerHTML = '<pre>Error loading app:\n' + err.message + '</pre>';
      }
    })();
  </script>
</body>
</html>
